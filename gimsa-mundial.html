/* ── RESET & BASE ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

/* ── CARDS ──────────────────────────────────────────── */

.card-title::before {

}

  // Grupo C
  { id:"c1", grupo:"C", eq1:"🏴󠁧󠁢󠁥󠁮󠁧󠁿 Inglaterra",  eq2:"🇩🇪 Alemania" },
  { id:"c2", grupo:"C", eq1:"🇫🇷 Francia",       eq2:"🇧🇪 Bélgica" },
  { id:"c3", grupo:"C", eq1:"🏴󠁧󠁢󠁥󠁮󠁧󠁿 Inglaterra",  eq2:"🇫🇷 Francia" },
  { id:"c4", grupo:"C", eq1:"🇩🇪 Alemania",      eq2:"🇧🇪 Bélgica" },

  { id:"d3", grupo:"D", eq1:"🇪🇸 España",        eq2:"🇳🇱 Países Bajos" },
  { id:"d4", grupo:"D", eq1:"🇵🇹 Portugal",      eq2:"🇭🇷 Croacia" },
];

/* ── ESTADO LOCAL ─────────────────────────────────────── */
let currentUser = null;   // "nombre apellido" en minúsculas (clave Firebase)
let currentUserDisplay = ""; // "Nombre Apellido" para mostrar

/* ── HELPERS FIREBASE ──────────────────────────────────── */
async function fbGet(path) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`);
  if (!r.ok) throw new Error("Firebase GET error " + r.status);
  return await r.json();
}
async function fbSet(path, data) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error("Firebase SET error " + r.status);
  return await r.json();
}
async function fbPatch(path, data) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error("Firebase PATCH error " + r.status);
  return await r.json();
}
function sanitizeKey(str) {
  // Firebase no permite . # $ [ ] / en claves
  return str.toLowerCase().trim()
    .replace(/[.#$\[\]\/]/g, "_")
    .replace(/\s+/g, "_");
}

/* ── NOMBRE DE EQUIPO SIN BANDERA ──────────────────────── */
function shortName(eq) {
  return eq.split(" ").slice(1).join(" ");
}

/* ── INIT ─────────────────────────────────────────────── */
async function init() {
  // Verificar que el usuario puso su URL de Firebase
  if (FIREBASE_URL.includes("TU-PROYECTO")) {
    document.getElementById("loading-screen").innerHTML = `
      <div style="text-align:center;padding:40px;max-width:400px;">
        <div style="font-size:36px;margin-bottom:12px;">⚠️</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);margin-bottom:10px;">FALTA CONFIGURAR FIREBASE</div>
        <p style="font-size:14px;color:var(--muted);line-height:1.6;">
          Abrí este archivo en un editor de texto (Bloc de Notas), buscá la línea que dice<br>
          <code style="background:var(--bg3);padding:2px 6px;border-radius:4px;color:var(--green);">const FIREBASE_URL = "https://TU-PROYECTO..."</code><br><br>
          y reemplazá esa URL con la URL de tu base de datos Firebase.<br><br>
          Después guardá el archivo y volvé a abrirlo.
        </p>
      </div>
    `;
    return;
  }

  try {
    // Intentar conexión
    await fbGet("ping");
  } catch(e) {
    // Firebase devuelve null para claves inexistentes — si llega acá es error real
    if (!e.message.includes("404") && !e.message.includes("null")) {
      document.getElementById("loading-screen").innerHTML = `
        <div style="text-align:center;padding:40px;max-width:360px;">
          <div style="font-size:36px;margin-bottom:12px;">🔌</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--red);margin-bottom:8px;">ERROR DE CONEXIÓN</div>
          <p style="font-size:13px;color:var(--muted);">Verificá que la URL de Firebase sea correcta y que la base de datos esté en modo "Prueba".</p>
          <p style="font-size:12px;color:var(--muted);margin-top:8px;font-style:italic;">${e.message}</p>
        </div>
      `;
      return;
    }
  }

  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("main-app").style.display = "block";

  // Verificar si hay sesión guardada
  const savedUser = localStorage.getItem("gimsa_user");
  const savedDisplay = localStorage.getItem("gimsa_user_display");
  if (savedUser && savedDisplay) {
    currentUser = savedUser;
    currentUserDisplay = savedDisplay;
    mostrarPredicciones();
  }
}

/* ── TABS ─────────────────────────────────────────────── */
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  document.getElementById("panel-" + tab).classList.add("active");
  if (tab === "fixture") renderFixture();
  if (tab === "ranking") renderRanking();
  if (tab === "admin")   renderAdmin();
}

/* ── REGISTRO ─────────────────────────────────────────── */
async function registrarColaborador() {
  const n = document.getElementById("inp-nombre").value.trim();
  const a = document.getElementById("inp-apellido").value.trim();
  if (!n || !a) { showAlert("Por favor ingresá nombre y apellido.", "red"); return; }

  currentUser = sanitizeKey(n + " " + a);
  currentUserDisplay = n + " " + a;

  localStorage.setItem("gimsa_user", currentUser);
  localStorage.setItem("gimsa_user_display", currentUserDisplay);

  // Crear/actualizar colaborador en Firebase
  try {
    const existing = await fbGet("colaboradores/" + currentUser);
    if (!existing) {
      await fbSet("colaboradores/" + currentUser, {
        nombre: n, apellido: a, pts: 0, ts: Date.now()
      });
    }
  } catch(e) { /* puede no existir */ }

  mostrarPredicciones();
}

async function mostrarPredicciones() {
  document.getElementById("section-registro").style.display = "none";
  document.getElementById("section-predicciones").style.display = "block";
  document.getElementById("welcome-text").textContent =
    `Hola ${currentUserDisplay}! Elegí el ganador de cada partido y guardá tus predicciones.`;
  document.getElementById("header-user-info").textContent = `Jugando como: ${currentUserDisplay}`;

  // Cargar predicciones previas del usuario
  let userPreds = {};
  try {
    const p = await fbGet("predicciones/" + currentUser);
    if (p) userPreds = p;
  } catch(e) {}

  renderMatchList(userPreds);
}

/* ── RENDER LISTA DE PARTIDOS ─────────────────────────── */
function renderMatchList(userPreds) {
  const grupos = {};
  PARTIDOS.forEach(p => {
    if (!grupos[p.grupo]) grupos[p.grupo] = [];
    grupos[p.grupo].push(p);
  });

  let html = "";
  Object.keys(grupos).sort().forEach(g => {
    html += `<div class="group-label">Grupo ${g}</div>`;
    grupos[g].forEach(p => {
      const sel = userPreds[p.id] || null;
      html += `
      <div class="match-card${sel ? " has-pred" : ""}" id="mc-${p.id}">
        <div class="match-teams">
          <div class="team-name team-a">${p.eq1}</div>
          <div class="vs-badge">VS</div>
          <div class="team-name team-b">${p.eq2}</div>
        </div>
        <div class="pred-row">
          <button class="pred-btn${sel==="a"?" sel-a":""}" onclick="selectPred('${p.id}','a',this,'${p.eq1.replace(/'/g,"\\'")}','${p.eq2.replace(/'/g,"\\'")}')">
            ${shortName(p.eq1)}
          </button>
          <button class="pred-btn${sel==="e"?" sel-e":""}" onclick="selectPred('${p.id}','e',this,'${p.eq1.replace(/'/g,"\\'")}','${p.eq2.replace(/'/g,"\\'")}')">
            Empate
          </button>
          <button class="pred-btn${sel==="b"?" sel-b":""}" onclick="selectPred('${p.id}','b',this,'${p.eq1.replace(/'/g,"\\'")}','${p.eq2.replace(/'/g,"\\'")}')">
            ${shortName(p.eq2)}
          </button>
        </div>
      </div>`;
    });
  });

  document.getElementById("matches-container").innerHTML = html;
}

/* ── SELECCIONAR PREDICCION ───────────────────────────── */
const localPreds = {};
function selectPred(matchId, pick, btn) {
  localPreds[matchId] = pick;
  const card = document.getElementById("mc-" + matchId);
  card.classList.add("has-pred");
  const btns = card.querySelectorAll(".pred-btn");
  btns.forEach(b => b.classList.remove("sel-a","sel-b","sel-e"));
  if (pick === "a") btn.classList.add("sel-a");
  else if (pick === "b") btn.classList.add("sel-b");
  else btn.classList.add("sel-e");
}

/* ── GUARDAR PREDICCIONES ──────────────────────────────── */
async function guardarPredicciones() {
  if (!currentUser) { showAlert("Primero ingresá tu nombre.", "red"); return; }

  const total = PARTIDOS.length;
  const completados = Object.keys(localPreds).length;

  if (completados < total) {
    const faltan = total - completados;
    if (!confirm(`Te faltan ${faltan} partido(s) sin predecir. ¿Guardar igual?`)) return;
  }

  try {
    await fbSet("predicciones/" + currentUser, localPreds);
    showAlert("✓ ¡Predicciones guardadas! Podés ver el ranking de todos.", "green");
  } catch(e) {
    showAlert("Error al guardar. Verificá tu conexión.", "red");
  }
}

/* ── RENDER FIXTURE ───────────────────────────────────── */
async function renderFixture() {
  document.getElementById("fixture-container").innerHTML =
    `<div class="empty"><div class="empty-icon">⏳</div>Cargando fixture...</div>`;

  let resultados = {};
  try {
    const r = await fbGet("resultados");
    if (r) resultados = r;
  } catch(e) {}

  const grupos = {};
  PARTIDOS.forEach(p => {
    if (!grupos[p.grupo]) grupos[p.grupo] = [];
    grupos[p.grupo].push(p);
  });

  let html = "";
  Object.keys(grupos).sort().forEach(g => {
    html += `<div class="group-label">Grupo ${g}</div>`;
    grupos[g].forEach(p => {
      const res = resultados[p.id] || null;
      const w1 = res === "a", w2 = res === "b";
      const resLabel = res === "a" ? shortName(p.eq1)
                     : res === "b" ? shortName(p.eq2)
                     : res === "e" ? "Empate"
                     : "Pendiente";
      html += `
      <div class="fixture-match">
        <div class="fix-team${w1?" winner":""}">${p.eq1}${w1?" ✓":""}</div>
        <div class="fix-result${res?" confirmed":""}">${resLabel}</div>
        <div class="fix-team b${w2?" winner":""}">${w2?"✓ ":""}${p.eq2}</div>
      </div>`;
    });
  });

  document.getElementById("fixture-container").innerHTML = html;
}

/* ── RENDER RANKING ───────────────────────────────────── */
async function renderRanking() {
  document.getElementById("ranking-container").innerHTML =
    `<div class="empty"><div class="empty-icon">⏳</div>Calculando ranking...</div>`;

  let colaboradores = {}, resultados = {}, predicciones = {};
  try {
    const [c, r, p] = await Promise.all([
      fbGet("colaboradores"),
      fbGet("resultados"),
      fbGet("predicciones")
    ]);
    if (c) colaboradores = c;
    if (r) resultados = r;
    if (p) predicciones = p;
  } catch(e) {}

  const keys = Object.keys(colaboradores);
  document.getElementById("stat-part").textContent = keys.length;
  document.getElementById("stat-res").textContent = Object.keys(resultados).length;

  if (keys.length === 0) {
    document.getElementById("ranking-container").innerHTML =
      `<div class="empty"><div class="empty-icon">👥</div>Aún no hay participantes registrados</div>`;
    return;
  }

  // Calcular puntos para cada colaborador
  const ranked = keys.map(k => {
    const preds = predicciones[k] || {};
    let pts = 0;
    PARTIDOS.forEach(p => {
      if (resultados[p.id] && preds[p.id] && resultados[p.id] === preds[p.id]) pts++;
    });
    return { key: k, ...colaboradores[k], pts };
  }).sort((a, b) => b.pts - a.pts || a.nombre.localeCompare(b.nombre));

  const maxPts = ranked[0].pts || 1;
  let html = "";
  ranked.forEach((r, i) => {
    const posClass = i === 0 ? "p1" : i === 1 ? "p2" : i === 2 ? "p3" : "pn";
    const rowClass = i === 0 ? "top1" : i === 1 ? "top2" : i === 2 ? "top3" : "";
    const pct = Math.round((r.pts / maxPts) * 100);
    const isMe = r.key === currentUser;
    html += `
    <div class="rank-row ${rowClass}" style="${isMe?"outline:1px solid var(--green);":""}" >
      <div class="rank-pos ${posClass}">${i + 1}</div>
      <div class="rank-name">${r.nombre} ${r.apellido}${isMe?' <span style="font-size:11px;color:var(--green);">(vos)</span>':''}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
      <div class="rank-pts">${r.pts}<span> pts</span></div>
    </div>`;
  });

  document.getElementById("ranking-container").innerHTML = html;
}

/* ── RENDER ADMIN ──────────────────────────────────────── */
async function renderAdmin() {
  document.getElementById("admin-container").innerHTML =
    `<div class="empty"><div class="empty-icon">⏳</div>Cargando...</div>`;

  let resultados = {};
  try {
    const r = await fbGet("resultados");
    if (r) resultados = r;
  } catch(e) {}

  const grupos = {};
  PARTIDOS.forEach(p => {
    if (!grupos[p.grupo]) grupos[p.grupo] = [];
    grupos[p.grupo].push(p);
  });

  let html = "";
  Object.keys(grupos).sort().forEach(g => {
    html += `<div class="group-label">Grupo ${g}</div>`;
    grupos[g].forEach(p => {
      const res = resultados[p.id] || null;
      html += `
      <div class="admin-match" id="am-${p.id}">
        <div class="admin-match-title">${p.eq1} vs ${p.eq2}</div>
        <div class="result-row">
          <button class="result-btn${res==="a"?" confirmed":""}" onclick="setResultado('${p.id}','a',this)">
            ${shortName(p.eq1)}
          </button>
          <button class="result-btn${res==="e"?" confirmed":""}" onclick="setResultado('${p.id}','e',this)">
            Empate
          </button>
          <button class="result-btn${res==="b"?" confirmed":""}" onclick="setResultado('${p.id}','b',this)">
            ${shortName(p.eq2)}
          </button>
        </div>
      </div>`;
    });
  });

  document.getElementById("admin-container").innerHTML = html;
}

/* ── SETEAR RESULTADO ──────────────────────────────────── */
const localResultados = {};
function setResultado(matchId, res, btn) {
  localResultados[matchId] = res;
  const btns = btn.parentElement.querySelectorAll(".result-btn");
  btns.forEach(b => b.classList.remove("confirmed"));
  btn.classList.add("confirmed");
}

/* ── RECALCULAR Y GUARDAR ─────────────────────────────── */
async function recalcularYGuardar() {
  if (Object.keys(localResultados).length === 0) {
    showAlert("Primero marcá los resultados de los partidos arriba.", "amber");
    return;
  }
  try {
    // Guardar resultados
    await fbPatch("resultados", localResultados);

    // Obtener todos los datos para recalcular
    const [colaboradores, todasPredicciones, todosResultados] = await Promise.all([
      fbGet("colaboradores"),
      fbGet("predicciones"),
      fbGet("resultados")
    ]);

    if (colaboradores && todasPredicciones && todosResultados) {
      const updates = {};
      Object.keys(colaboradores).forEach(k => {
        const preds = todasPredicciones[k] || {};
        let pts = 0;
        PARTIDOS.forEach(p => {
          if (todosResultados[p.id] && preds[p.id] && todosResultados[p.id] === preds[p.id]) pts++;
        });
        updates["colaboradores/" + k + "/pts"] = pts;
      });
      // Guardar puntos actualizados
      await fbPatch("", updates);
    }

    showAlert("✓ Resultados guardados y ranking recalculado.", "green");
  } catch(e) {
    showAlert("Error al guardar: " + e.message, "red");
  }
}

/* ── SHOW ALERT ───────────────────────────────────────── */
function showAlert(msg, type) {
  const div = document.createElement("div");
  div.className = `alert alert-${type}`;
  div.style.cssText = "position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;max-width:360px;width:90%;";
  div.innerHTML = `<span class="alert-icon">${type==="green"?"✓":type==="amber"?"⚠️":"✕"}</span><span>${msg}</span>`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3500);
}

/* ── ARRANCAR ─────────────────────────────────────────── */
init();
</script>
