<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIMSA · Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  const FIREBASE_URL = "https://gimsa-mundial-default-rtdb.firebaseio.com";
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:#00C17A; --green-d:#008F5A; --green-l:#E0FFF3;
  --gold:#F5B800; --gold-l:#FFF8E0; --red:#FF3B30;
  --bg:#0D1117; --bg2:#161C25; --bg3:#1E2633;
  --border:rgba(255,255,255,0.07); --text:#F0F4F8; --muted:#7A8899;
  --radius:12px; --font-h:'Bebas Neue',sans-serif; --font-b:'DM Sans',sans-serif;
}
html,body{height:100%;}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(0,193,122,0.08) 0%,transparent 70%),
             radial-gradient(ellipse 50% 30% at 10% 90%,rgba(245,184,0,0.06) 0%,transparent 70%);}
.app{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 16px 80px;}
.header{text-align:center;padding:36px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:4px 14px;font-size:11px;letter-spacing:0.08em;color:var(--green);
  text-transform:uppercase;margin-bottom:10px;}
.header-badge::before{content:'⚽';font-size:13px;}
.header h1{font-family:var(--font-h);font-size:clamp(42px,10vw,64px);letter-spacing:0.04em;line-height:1;
  background:linear-gradient(135deg,#fff 0%,var(--green) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header p{font-size:13px;color:var(--muted);margin-top:6px;}
.tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:4px;margin-bottom:24px;}
.tab{flex:1;padding:9px 6px;font-size:12px;font-weight:500;border:none;background:transparent;
  cursor:pointer;border-radius:8px;color:var(--muted);font-family:var(--font-b);
  transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.tab .ti{font-size:16px;}
.tab:hover{color:var(--text);background:var(--bg3);}
.tab.active{background:var(--green);color:#000;font-weight:600;}
.panel{display:none;animation:fadeUp 0.25s ease;}
.panel.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;}
.card-title{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';width:3px;height:14px;background:var(--green);border-radius:2px;}
.form-row{margin-bottom:12px;}
.form-label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;}
input[type=text]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:11px 14px;font-size:14px;font-family:var(--font-b);color:var(--text);outline:none;transition:border 0.2s;}
input[type=text]:focus{border-color:var(--green);}
input[type=text]::placeholder{color:var(--muted);}
.btn{padding:11px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--font-b);border:1px solid transparent;transition:all 0.15s;
  display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--green);color:#000;}
.btn-primary:hover{background:var(--green-d);}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text);}
.btn-ghost:hover{background:var(--bg3);}
.btn-full{width:100%;justify-content:center;}
.alert{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;
  display:flex;align-items:flex-start;gap:8px;}
.alert-green{background:rgba(0,193,122,0.1);border:1px solid rgba(0,193,122,0.25);color:#6DFFCA;}
.alert-amber{background:rgba(245,184,0,0.1);border:1px solid rgba(245,184,0,0.25);color:#FFD84D;}
.alert-red{background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.25);color:#FF8B85;}

/* Fase labels */
.fase-label{font-family:var(--font-h);font-size:20px;letter-spacing:0.05em;color:var(--green);
  margin:20px 0 6px;display:flex;align-items:center;gap:8px;}
.fase-label::after{content:'';flex:1;height:1px;background:var(--border);}
.fase-pts{font-size:11px;font-family:var(--font-b);background:rgba(0,193,122,0.15);
  color:var(--green);padding:2px 8px;border-radius:20px;letter-spacing:0.02em;}
.group-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:0.06em;
  text-transform:uppercase;margin:10px 0 6px;padding-left:4px;}

/* Match cards */
.match-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:8px;transition:border-color 0.2s;}
.match-card.has-pred{border-color:rgba(0,193,122,0.3);}
.match-card.locked{opacity:0.5;pointer-events:none;}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:10px;}
.team-name{font-size:13px;font-weight:500;line-height:1.3;}
.team-a{text-align:right;}
.team-b{text-align:left;}
.vs-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;
  font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.05em;white-space:nowrap;}
.pred-row{display:flex;gap:6px;}
.pred-btn{flex:1;padding:7px 4px;font-size:11px;font-weight:500;border:1px solid var(--border);
  border-radius:6px;background:transparent;cursor:pointer;color:var(--muted);
  font-family:var(--font-b);transition:all 0.15s;text-align:center;}
.pred-btn:hover{background:var(--bg3);color:var(--text);}
.pred-btn.sel-a{background:rgba(0,193,122,0.15);border-color:var(--green);color:var(--green);font-weight:600;}
.pred-btn.sel-b{background:rgba(59,130,246,0.15);border-color:#3B82F6;color:#60A5FA;font-weight:600;}
.pred-btn.sel-e{background:rgba(245,184,0,0.15);border-color:var(--gold);color:var(--gold);font-weight:600;}
.pending-note{font-size:11px;color:var(--muted);text-align:center;padding:8px;
  background:var(--bg3);border-radius:6px;margin-top:6px;}

/* Fixture */
.fixture-fase{margin-bottom:16px;}
.fix-match{display:flex;align-items:center;gap:8px;background:var(--bg2);
  border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;}
.fix-team{flex:1;font-size:13px;font-weight:500;}
.fix-team.winner{color:var(--green);}
.fix-team.b{text-align:right;}
.fix-result{min-width:86px;text-align:center;font-size:11px;font-weight:600;
  background:var(--bg3);border-radius:6px;padding:5px 8px;color:var(--muted);}
.fix-result.ok{background:rgba(0,193,122,0.12);color:var(--green);border:1px solid rgba(0,193,122,0.3);}
.fix-pts{font-size:10px;color:var(--gold);white-space:nowrap;}

/* Ranking */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;text-align:center;}
.stat-num{font-family:var(--font-h);font-size:32px;color:var(--green);line-height:1;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;}
.rank-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius);
  background:var(--bg2);border:1px solid var(--border);margin-bottom:6px;}
.rank-row.top1{border-color:var(--gold);background:rgba(245,184,0,0.06);}
.rank-row.top2{border-color:#9CA3AF;}
.rank-row.top3{border-color:#CD7F32;}
.rank-pos{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.p1{background:var(--gold);color:#000;} .p2{background:#9CA3AF;color:#000;}
.p3{background:#CD7F32;color:#fff;} .pn{background:var(--bg3);color:var(--muted);}
.rank-name{flex:1;font-size:14px;font-weight:500;}
.rank-detail{font-size:11px;color:var(--muted);}
.rank-bar-wrap{width:60px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.rank-bar{height:100%;background:var(--green);border-radius:2px;transition:width 0.5s;}
.rank-pts{font-family:var(--font-h);font-size:20px;color:var(--green);min-width:40px;text-align:right;}
.rank-pts span{font-family:var(--font-b);font-size:10px;color:var(--muted);font-weight:400;}

/* Admin */
.admin-fase{margin-bottom:16px;}
.admin-match{background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--gold);}
.admin-match-title{font-size:13px;font-weight:500;margin-bottom:6px;display:flex;
  align-items:center;justify-content:space-between;}
.pts-badge{font-size:10px;background:rgba(245,184,0,0.15);color:var(--gold);
  padding:2px 7px;border-radius:10px;font-family:var(--font-b);}
.result-row{display:flex;gap:6px;}
.result-btn{flex:1;padding:7px;font-size:11px;font-weight:500;border:1px solid var(--border);
  border-radius:6px;background:transparent;cursor:pointer;color:var(--muted);
  font-family:var(--font-b);transition:all 0.15s;}
.result-btn:hover{background:var(--bg3);color:var(--text);}
.result-btn.confirmed{background:rgba(0,193,122,0.15);border-color:var(--green);color:var(--green);font-weight:600;}

/* Loading */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);
  border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-screen p{font-size:13px;color:var(--muted);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
.empty-icon{font-size:36px;margin-bottom:10px;}
@media(max-width:400px){.tab{font-size:10px;padding:8px 4px;}.team-name{font-size:12px;}.stats-row{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div id="loading-screen">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.1em;color:var(--green)">GIMSA MUNDIAL</div>

  <p>Conectando...</p>
</div>

<div class="app" id="main-app" style="display:none;">
  <div class="header">

  </div>

  <!-- COLABORADOR -->

      <div class="card">
        <div class="card-title">Tu información</div>
        <div class="form-row"><label class="form-label">Nombre</label><input type="text" id="inp-nombre" placeholder="Ej: Martín" maxlength="30"/></div>
        <div class="form-row"><label class="form-label">Apellido</label><input type="text" id="inp-apellido" placeholder="Ej: García" maxlength="30"/></div>
        <button class="btn btn-primary btn-full" onclick="registrarColaborador()">⚽ Comenzar a predecir</button>

    </div>

      <div id="matches-container"></div>
      <button class="btn btn-primary btn-full" onclick="guardarPredicciones()" style="margin-top:8px;">💾 Guardar predicciones</button>

  <!-- FIXTURE -->
  <div class="panel" id="panel-fixture">

  <!-- RANKING -->

      <div class="stat-box"><div class="stat-num" id="stat-res">0</div><div class="stat-lbl">resultados</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-maxpts">0</div><div class="stat-lbl">pts posibles</div></div>
    </div>
    <div id="ranking-container"></div>
  </div>

  <!-- ADMIN -->
  <div class="panel" id="panel-admin">
    <div class="alert alert-amber"><span>🔒</span><span>Panel del moderador. Cargá los resultados reales a medida que avanza el mundial.</span></div>
    <div id="admin-container"></div>
    <button class="btn btn-primary btn-full" onclick="recalcularYGuardar()" style="margin-top:12px;">🔄 Recalcular ranking</button>
  </div>
</div>

<script>

// Todos los partidos en un array plano con su puntaje
function todosLosPartidos() {
  const lista = [];
  FASES.forEach(f => {
    if (f.grupos) {
      Object.values(f.grupos).forEach(g => g.forEach(p => lista.push({...p, pts: f.pts, faseId: f.id})));
    } else {
      f.partidos.forEach(p => lista.push({...p, pts: f.pts, faseId: f.id}));
    }
  });
  return lista;
}

function shortName(eq) { return eq.split(" ").slice(1).join(" "); }
function sanitizeKey(s) { return s.toLowerCase().trim().replace(/[.#$\[\]\/]/g,"_").replace(/\s+/g,"_"); }

// ═══════════════════════════════════════════════
// FIREBASE HELPERS
// ═══════════════════════════════════════════════
async function fbGet(path) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`);
  if (!r.ok) throw new Error("GET " + r.status);
  return await r.json();
}
async function fbSet(path, data) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`, {
    method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error("SET " + r.status);
  return await r.json();
}
async function fbPatch(path, data) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`, {
    method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error("PATCH " + r.status);
  return await r.json();
}

// ═══════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════
let currentUser = null;
let currentUserDisplay = "";
const localPreds = {};
const localResultados = {};

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
async function init() {
  try { await fbGet("ping"); } catch(e) { /* null es ok */ }
  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("main-app").style.display = "block";
  const su = localStorage.getItem("gimsa_user");
  const sd = localStorage.getItem("gimsa_user_display");
  if (su && sd) { currentUser = su; currentUserDisplay = sd; mostrarPredicciones(); }
}

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  document.getElementById("panel-"+tab).classList.add("active");
  if (tab==="fixture") renderFixture();
  if (tab==="ranking") renderRanking();
  if (tab==="admin")   renderAdmin();
}

// ═══════════════════════════════════════════════
// REGISTRO
// ═══════════════════════════════════════════════
async function registrarColaborador() {
  const n = document.getElementById("inp-nombre").value.trim();
  const a = document.getElementById("inp-apellido").value.trim();
  if (!n||!a) { showAlert("Por favor ingresá nombre y apellido.","red"); return; }
  currentUser = sanitizeKey(n+" "+a);
  currentUserDisplay = n+" "+a;
  localStorage.setItem("gimsa_user", currentUser);
  localStorage.setItem("gimsa_user_display", currentUserDisplay);
  try {
    const ex = await fbGet("colaboradores/"+currentUser);
    if (!ex) await fbSet("colaboradores/"+currentUser, {nombre:n,apellido:a,pts:0,ts:Date.now()});
  } catch(e) {}
  mostrarPredicciones();
}

async function mostrarPredicciones() {
  document.getElementById("section-registro").style.display = "none";
  document.getElementById("section-predicciones").style.display = "block";
  document.getElementById("welcome-text").textContent =
    `Hola ${currentUserDisplay}! Elegí el ganador de cada partido y guardá tus predicciones.`;
  document.getElementById("header-user-info").textContent = `Jugando como: ${currentUserDisplay}`;
  let userPreds = {};
  try { const p = await fbGet("predicciones/"+currentUser); if(p) { Object.assign(userPreds,p); Object.assign(localPreds,p); } } catch(e){}
  renderMatchList(userPreds);
}

// ═══════════════════════════════════════════════
// RENDER PARTIDOS (COLABORADOR)
// ═══════════════════════════════════════════════
function renderMatchList(userPreds) {
  let html = "";
  FASES.forEach(f => {
    html += `<div class="fase-label">${f.nombre} <span class="fase-pts">${f.pts} pt${f.pts>1?'s':''} c/u</span></div>`;
    if (f.grupos) {
      Object.keys(f.grupos).sort().forEach(g => {
        html += `<div class="group-label">Grupo ${g}</div>`;
        f.grupos[g].forEach(p => html += matchCard(p, userPreds[p.id]||null, false));
      });
    } else {
      const locked = f.id !== "grupos";
      f.partidos.forEach(p => html += matchCard(p, userPreds[p.id]||null, locked));
    }
  });
  document.getElementById("matches-container").innerHTML = html;
}

function matchCard(p, sel, locked) {
  if (locked) {
    return `<div class="match-card locked">
      <div class="match-teams">
        <div class="team-name team-a">${p.eq1}</div>
        <div class="vs-badge">VS</div>
        <div class="team-name team-b">${p.eq2}</div>
      </div>
      <div class="pending-note">🔒 Se habilita cuando avance el torneo</div>
    </div>`;
  }
  return `<div class="match-card${sel?" has-pred":""}" id="mc-${p.id}">
    <div class="match-teams">
      <div class="team-name team-a">${p.eq1}</div>
      <div class="vs-badge">VS</div>
      <div class="team-name team-b">${p.eq2}</div>
    </div>
    <div class="pred-row">
      <button class="pred-btn${sel==="a"?" sel-a":""}" onclick="selectPred('${p.id}','a',this)">${shortName(p.eq1)}</button>
      <button class="pred-btn${sel==="e"?" sel-e":""}" onclick="selectPred('${p.id}','e',this)">Empate</button>
      <button class="pred-btn${sel==="b"?" sel-b":""}" onclick="selectPred('${p.id}','b',this)">${shortName(p.eq2)}</button>
    </div>
  </div>`;
}

function selectPred(matchId, pick, btn) {
  localPreds[matchId] = pick;
  const card = document.getElementById("mc-"+matchId);
  card.classList.add("has-pred");
  card.querySelectorAll(".pred-btn").forEach(b => b.classList.remove("sel-a","sel-b","sel-e"));
  btn.classList.add(pick==="a"?"sel-a":pick==="b"?"sel-b":"sel-e");
}

async function guardarPredicciones() {
  if (!currentUser) { showAlert("Primero ingresá tu nombre.","red"); return; }
  const totalGrupos = Object.values(FASES[0].grupos).flat().length;
  const completados = Object.keys(localPreds).filter(k=>k.startsWith("a")||k.startsWith("b")||k.startsWith("c")||k.startsWith("d")).length;
  if (completados < totalGrupos) {
    if (!confirm(`Te faltan ${totalGrupos-completados} partido(s) de grupos sin predecir. ¿Guardar igual?`)) return;
  }
  try {
    await fbSet("predicciones/"+currentUser, localPreds);
    showAlert("✓ ¡Predicciones guardadas! Ya podés ver el ranking.","green");
  } catch(e) { showAlert("Error al guardar. Verificá tu conexión.","red"); }
}

// ═══════════════════════════════════════════════
// FIXTURE
// ═══════════════════════════════════════════════
async function renderFixture() {
  document.getElementById("fixture-container").innerHTML =
    `<div class="empty"><div class="empty-icon">⏳</div>Cargando fixture...</div>`;
  let resultados = {};
  try { const r = await fbGet("resultados"); if(r) resultados=r; } catch(e){}
  let html = "";
  FASES.forEach(f => {
    html += `<div class="fixture-fase"><div class="fase-label">${f.nombre} <span class="fase-pts">${f.pts} pt${f.pts>1?'s':''}</span></div>`;
    const partidos = f.grupos ? Object.values(f.grupos).flat() : f.partidos;
    if (f.grupos) {
      Object.keys(f.grupos).sort().forEach(g => {
        html += `<div class="group-label">Grupo ${g}</div>`;
        f.grupos[g].forEach(p => {
          const res = resultados[p.id]||null;
          html += fixRow(p, res, f.pts);
        });
      });
    } else {
      partidos.forEach(p => { html += fixRow(p, resultados[p.id]||null, f.pts); });
    }
    html += `</div>`;
  });
  document.getElementById("fixture-container").innerHTML = html;
}

function fixRow(p, res, pts) {
  const w1=res==="a", w2=res==="b";
  const lbl = res==="a"?shortName(p.eq1):res==="b"?shortName(p.eq2):res==="e"?"Empate":"Pendiente";
  return `<div class="fix-match">
    <div class="fix-team${w1?" winner":""}">${p.eq1}${w1?" ✓":""}</div>
    <div>
      <div class="fix-result${res?" ok":""}">${lbl}</div>
      ${res?`<div class="fix-pts" style="text-align:center;margin-top:3px;">+${pts} pts</div>`:""}
    </div>
    <div class="fix-team b${w2?" winner":""}">${w2?"✓ ":""}${p.eq2}</div>
  </div>`;
}

// ═══════════════════════════════════════════════
// RANKING
// ═══════════════════════════════════════════════
async function renderRanking() {
  document.getElementById("ranking-container").innerHTML =
    `<div class="empty"><div class="empty-icon">⏳</div>Calculando ranking...</div>`;
  let colaboradores={}, resultados={}, predicciones={};
  try {
    const [c,r,p] = await Promise.all([fbGet("colaboradores"),fbGet("resultados"),fbGet("predicciones")]);
    if(c) colaboradores=c; if(r) resultados=r; if(p) predicciones=p;
  } catch(e){}

  const todos = todosLosPartidos();
  const maxPosible = todos.filter(p => resultados[p.id]).reduce((s,p)=>s+p.pts,0);
  const totalRes = Object.keys(resultados).length;
  const keys = Object.keys(colaboradores);

  document.getElementById("stat-part").textContent = keys.length;
  document.getElementById("stat-res").textContent = totalRes;
  document.getElementById("stat-maxpts").textContent = maxPosible;

  if (keys.length===0) {
    document.getElementById("ranking-container").innerHTML =
      `<div class="empty"><div class="empty-icon">👥</div>Aún no hay participantes registrados</div>`;
    return;
  }

  const ranked = keys.map(k => {
    const preds = predicciones[k]||{};
    let pts=0, aciertos=0;
    todos.forEach(p => {
      if (resultados[p.id] && preds[p.id] && resultados[p.id]===preds[p.id]) {
        pts += p.pts; aciertos++;
      }
    });
    return {...colaboradores[k], key:k, pts, aciertos};
  }).sort((a,b)=>b.pts-a.pts||a.nombre.localeCompare(b.nombre));

  const maxPts = ranked[0].pts||1;
  let html="";
  ranked.forEach((r,i) => {
    const pc=i===0?"p1":i===1?"p2":i===2?"p3":"pn";
    const rc=i===0?"top1":i===1?"top2":i===2?"top3":"";
    const pct=Math.round((r.pts/Math.max(maxPts,1))*100);
    const isMe = r.key===currentUser;
    html+=`<div class="rank-row ${rc}"${isMe?' style="outline:1px solid var(--green);"':''}>
      <div class="rank-pos ${pc}">${i+1}</div>
      <div style="flex:1;">
        <div class="rank-name">${r.nombre} ${r.apellido}${isMe?' <span style="font-size:10px;color:var(--green)">(vos)</span>':''}</div>
        <div class="rank-detail">${r.aciertos} acierto${r.aciertos!==1?'s':''}</div>
      </div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
      <div class="rank-pts">${r.pts}<span> pts</span></div>
    </div>`;
  });
  document.getElementById("ranking-container").innerHTML = html;
}

// ═══════════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════════
async function renderAdmin() {
  document.getElementById("admin-container").innerHTML =
    `<div class="empty"><div class="empty-icon">⏳</div>Cargando...</div>`;
  let resultados={};
  try { const r=await fbGet("resultados"); if(r) { Object.assign(resultados,r); Object.assign(localResultados,r); } } catch(e){}

  let html="";
  FASES.forEach(f => {
    html+=`<div class="admin-fase"><div class="fase-label">${f.nombre} <span class="fase-pts">${f.pts} pt${f.pts>1?'s':''}</span></div>`;
    const partidos = f.grupos ? Object.values(f.grupos).flat() : f.partidos;
    if (f.grupos) {
      Object.keys(f.grupos).sort().forEach(g => {
        html+=`<div class="group-label">Grupo ${g}</div>`;
        f.grupos[g].forEach(p => { html+=adminRow(p, resultados[p.id]||null, f.pts); });
      });
    } else {
      partidos.forEach(p => { html+=adminRow(p, resultados[p.id]||null, f.pts); });
    }
    html+=`</div>`;
  });
  document.getElementById("admin-container").innerHTML = html;
}

function adminRow(p, res, pts) {
  return `<div class="admin-match">
    <div class="admin-match-title">
      <span>${p.eq1} vs ${p.eq2}</span>
      <span class="pts-badge">+${pts} pts</span>
    </div>
    <div class="result-row">
      <button class="result-btn${res==="a"?" confirmed":""}" onclick="setResultado('${p.id}','a',this)">${shortName(p.eq1)}</button>
      <button class="result-btn${res==="e"?" confirmed":""}" onclick="setResultado('${p.id}','e',this)">Empate</button>
      <button class="result-btn${res==="b"?" confirmed":""}" onclick="setResultado('${p.id}','b',this)">${shortName(p.eq2)}</button>
    </div>
  </div>`;
}

function setResultado(matchId, res, btn) {
  localResultados[matchId] = res;
  btn.parentElement.querySelectorAll(".result-btn").forEach(b=>b.classList.remove("confirmed"));
  btn.classList.add("confirmed");
}

async function recalcularYGuardar() {
  if (Object.keys(localResultados).length===0) {
    showAlert("Primero marcá resultados arriba.","amber"); return;
  }
  try {
    await fbPatch("resultados", localResultados);
    const [colaboradores, todasPreds, todosRes] = await Promise.all([
      fbGet("colaboradores"), fbGet("predicciones"), fbGet("resultados")
    ]);
    if (colaboradores && todasPreds && todosRes) {
      const todos = todosLosPartidos();
      const updates={};
      Object.keys(colaboradores).forEach(k=>{
        const preds=todasPreds[k]||{};
        let pts=0;
        todos.forEach(p=>{ if(todosRes[p.id]&&preds[p.id]&&todosRes[p.id]===preds[p.id]) pts+=p.pts; });
        updates["colaboradores/"+k+"/pts"]=pts;
      });
      await fbPatch("", updates);
    }
    showAlert("✓ Resultados guardados y ranking actualizado.","green");
  } catch(e) { showAlert("Error: "+e.message,"red"); }
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function showAlert(msg, type) {
  const d=document.createElement("div");
  d.className=`alert alert-${type}`;
  d.style.cssText="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;max-width:360px;width:90%;box-shadow:0 4px 20px rgba(0,0,0,0.4);";
  d.innerHTML=`<span>${type==="green"?"✓":type==="amber"?"⚠️":"✕"}</span><span>${msg}</span>`;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),3500);
}

init();
</script>
